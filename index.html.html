
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>What's Your Avurudu Personality? | ERABADU 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --emerald: #0D3B2E;
  --emerald-mid: #1A5C40;
  --gold: #C9973A;
  --gold-bright: #F0C060;
  --crimson: #A8161E;
  --cream: #FFF9ED;
  --terracotta: #C4654A;
  --sun: #F4870A;
  --amber: #FFBF47;
  --blush: #F7C5B0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; min-height: 100%;
  font-family: 'Raleway', sans-serif;
  background: #FFF1D6;
  overflow-x: hidden;
}

/* ── NOISE LAYER ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.5;
}

/* ── ANIMATED BG ── */
#bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(160deg, #FFECB3 0%, #FFD07A 40%, #FF9B3A 75%, #D45A2A 100%);
  overflow: hidden;
}
.sun-bg {
  position: absolute;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle, #FFFDE7 0%, #FFE082 40%, #FF8F00 70%, transparent 100%);
  top: -60px; left: 50%; transform: translateX(-50%);
  filter: blur(4px);
  box-shadow: 0 0 100px 50px rgba(255,200,60,0.3);
  animation: sunPulse 5s ease-in-out infinite;
}
@keyframes sunPulse {
  0%,100%{transform:translateX(-50%) scale(1);opacity:0.85}
  50%{transform:translateX(-50%) scale(1.08);opacity:1}
}
.cloud {
  position: absolute; border-radius: 60px;
  background: rgba(255,255,255,0.15); filter: blur(10px);
  animation: drift linear infinite;
}
@keyframes drift { from{transform:translateX(-300px)} to{transform:translateX(110vw)} }
.hills-svg { position: absolute; bottom: 0; width: 100%; }

/* ── WRAPPER ── */
#app {
  position: relative; z-index: 10;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 0 0 60px;
}

/* ── HEADER ── */
.site-header {
  width: 100%; text-align: center;
  padding: 28px 20px 18px;
  background: linear-gradient(to bottom, rgba(13,59,46,0.9), transparent);
}
.site-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(15px, 3.5vw, 22px);
  color: var(--gold-bright);
  letter-spacing: 6px;
  text-shadow: 0 2px 14px rgba(0,0,0,0.4);
}
.site-sub {
  font-size: 9px; letter-spacing: 4px; font-weight: 700;
  color: rgba(255,220,100,0.7); text-transform: uppercase;
  margin-top: 3px;
}

/* ── SCREEN SYSTEM ── */
.screen {
  display: none; width: 100%; max-width: 620px;
  padding: 0 16px;
  animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
.screen.visible { display: flex; flex-direction: column; align-items: center; }
@keyframes fadeUp {
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── INTRO SCREEN ── */
.intro-badge {
  margin: 30px auto 0;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 10px 22px;
  font-size: 10px; font-weight: 800; letter-spacing: 4px;
  color: var(--emerald); text-transform: uppercase;
}
.intro-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(22px, 6vw, 38px);
  color: var(--emerald);
  text-align: center;
  line-height: 1.2;
  margin: 18px 0 10px;
  text-shadow: 0 2px 0 rgba(255,255,255,0.4);
}
.intro-title span { color: var(--crimson); }
.intro-sub {
  font-size: 14px; color: rgba(13,59,46,0.75);
  text-align: center; line-height: 1.7;
  font-style: italic;
  font-family: 'Playfair Display', serif;
  margin-bottom: 24px;
  max-width: 420px;
}

/* Character preview strip */
.char-strip {
  display: flex; gap: 10px; justify-content: center;
  flex-wrap: wrap; margin: 10px 0 28px;
}
.char-preview {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.22);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 16px;
  padding: 12px 10px 8px;
  width: 90px;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  cursor: default;
}
.char-preview:hover { transform: translateY(-5px) scale(1.04); }
.char-emoji { font-size: 32px; line-height: 1; }
.char-name-mini {
  font-size: 8px; font-weight: 800; letter-spacing: 1px;
  color: var(--emerald); text-align: center; text-transform: uppercase;
}

/* Gender select */
.gender-row {
  display: flex; gap: 14px; margin-bottom: 22px; justify-content: center;
}
.gender-btn {
  flex: 1; max-width: 180px;
  padding: 16px 10px;
  border: 2px solid rgba(13,59,46,0.25);
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(10px);
  border-radius: 16px; cursor: pointer;
  font-family: 'Raleway', sans-serif;
  font-weight: 800; font-size: 13px; letter-spacing: 2px;
  color: var(--emerald); text-align: center;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  text-transform: uppercase;
}
.gender-btn .g-emoji { font-size: 28px; display: block; margin-bottom: 6px; }
.gender-btn:hover { border-color: var(--gold); background: rgba(255,215,80,0.2); transform: translateY(-3px); }
.gender-btn.selected { background: var(--emerald); color: var(--gold-bright); border-color: var(--emerald); transform: scale(1.04); }

.btn-start {
  padding: 18px 52px;
  background: linear-gradient(135deg, var(--crimson), #7B0F15);
  color: white; border: none; border-radius: 50px;
  font-family: 'Cinzel Decorative', serif;
  font-size: 13px; letter-spacing: 3px; cursor: pointer;
  box-shadow: 0 10px 30px rgba(168,22,30,0.4);
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; overflow: hidden;
}
.btn-start::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
}
.btn-start:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 16px 40px rgba(168,22,30,0.5); }
.btn-start:active { transform: scale(0.97); }

/* ── QUIZ SCREEN ── */
.quiz-card {
  width: 100%;
  background: rgba(255,252,240,0.85);
  backdrop-filter: blur(20px) saturate(1.3);
  border: 1px solid rgba(201,151,58,0.3);
  border-radius: 28px;
  padding: 30px 24px;
  box-shadow: 0 25px 60px rgba(10,30,20,0.15), 0 0 0 1px rgba(255,255,255,0.5) inset;
  margin-top: 20px;
}

.q-progress {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.q-counter {
  font-size: 10px; font-weight: 800; letter-spacing: 3px;
  color: var(--terracotta); text-transform: uppercase;
}
.q-bar-outer {
  flex: 1; height: 5px; background: rgba(0,0,0,0.08);
  border-radius: 10px; margin: 0 14px; overflow: hidden;
}
.q-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-bright));
  border-radius: 10px;
  transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
  box-shadow: 0 0 6px var(--gold-bright);
}

.q-icon { font-size: 42px; text-align: center; margin-bottom: 12px; animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes bounceIn { from{transform:scale(0.4) rotate(-10deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }

.q-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(16px, 3.5vw, 21px);
  color: var(--emerald); text-align: center;
  line-height: 1.45; margin-bottom: 24px;
  font-weight: 700;
}

.answers-grid {
  display: flex; flex-direction: column; gap: 10px;
}
.ans-btn {
  width: 100%; padding: 14px 18px;
  background: rgba(255,255,255,0.75);
  border: 1.5px solid rgba(13,59,46,0.18);
  border-radius: 14px; cursor: pointer;
  font-family: 'Raleway', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--emerald); text-align: left;
  transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; align-items: center; gap: 12px;
}
.ans-btn .ans-emoji { font-size: 20px; flex-shrink: 0; }
.ans-btn:hover {
  border-color: var(--gold);
  background: rgba(255,210,70,0.18);
  transform: translateX(4px);
}
.ans-btn.chosen {
  background: var(--emerald); color: var(--gold-bright);
  border-color: var(--emerald);
  transform: scale(1.02);
  box-shadow: 0 6px 18px rgba(13,59,46,0.3);
}

/* ── RESULT SCREEN ── */
.result-wrap { width: 100%; margin-top: 18px; }

.result-card {
  width: 100%; border-radius: 28px; overflow: hidden;
  box-shadow: 0 30px 70px rgba(0,0,0,0.2);
  position: relative;
}
.result-banner {
  padding: 36px 24px 24px;
  text-align: center; position: relative;
}
.result-emoji-big {
  font-size: 80px; line-height: 1;
  display: block; margin-bottom: 10px;
  animation: popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes popIn {
  from{transform:scale(0) rotate(-20deg);opacity:0}
  to{transform:scale(1) rotate(0deg);opacity:1}
}
.result-archetype {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(11px, 3vw, 15px);
  letter-spacing: 4px;
  opacity: 0.8;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.result-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(22px, 6vw, 36px);
  line-height: 1.1;
  margin-bottom: 6px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.result-title-sinhala {
  font-family: 'Playfair Display', serif;
  font-size: clamp(13px, 3vw, 17px);
  font-style: italic;
  opacity: 0.75;
  margin-bottom: 0;
}

.result-body {
  background: rgba(255,252,240,0.95);
  padding: 26px 24px 28px;
}
.result-desc {
  font-size: 14px; line-height: 1.75;
  color: var(--emerald);
  font-family: 'Playfair Display', serif;
  font-style: italic;
  text-align: center;
  margin-bottom: 20px;
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(201,151,58,0.25);
}
.traits-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-bottom: 20px;
}
.trait-chip {
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 11px; font-weight: 800; letter-spacing: 1.5px;
  text-transform: uppercase;
  border: 1.5px solid;
}
.fun-fact-box {
  background: rgba(13,59,46,0.06);
  border-left: 3px solid var(--gold);
  border-radius: 0 12px 12px 0;
  padding: 14px 16px;
  margin-bottom: 22px;
}
.fun-fact-label {
  font-size: 9px; font-weight: 800; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase; margin-bottom: 5px;
}
.fun-fact-text {
  font-size: 13px; color: var(--emerald); line-height: 1.6;
  font-weight: 600;
}

.share-row {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
}
.btn-share {
  padding: 13px 28px;
  border-radius: 50px; border: none; cursor: pointer;
  font-family: 'Raleway', sans-serif;
  font-size: 12px; font-weight: 800; letter-spacing: 2px;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  text-transform: uppercase;
}
.btn-share:hover { transform: translateY(-2px) scale(1.04); }
.btn-again {
  background: var(--emerald); color: var(--gold-bright);
  box-shadow: 0 8px 24px rgba(13,59,46,0.3);
}
.btn-copy {
  background: var(--crimson); color: white;
  box-shadow: 0 8px 24px rgba(168,22,30,0.3);
}

/* Confetti */
.confetti-piece {
  position: fixed; top: -20px;
  width: 10px; height: 10px;
  border-radius: 2px;
  animation: confettiFall linear forwards;
  pointer-events: none; z-index: 5000;
}
@keyframes confettiFall {
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* Toast */
.toast {
  position: fixed; bottom: 36px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--emerald); color: var(--gold-bright);
  padding: 11px 24px; border-radius: 50px;
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  z-index: 9000; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }
</style>
</head>
<body>

<!-- BG -->
<div id="bg">
  <div class="sun-bg"></div>
  <div class="cloud" style="width:160px;height:45px;top:22%;animation-duration:30s;animation-delay:-8s;opacity:0.6"></div>
  <div class="cloud" style="width:100px;height:30px;top:14%;animation-duration:24s;animation-delay:-3s;opacity:0.45"></div>

</div>

<!-- APP -->
<div id="app">

  <!-- HEADER -->
  <div class="site-header">
    <div class="site-title">ERABADU 2026</div>
    <div class="site-sub">AIESEC IN NIBM</div>
  </div>

  <!-- ════ INTRO SCREEN ════ -->
  <div class="screen visible" id="screen-intro">

    <div class="intro-badge">✦ Avurudu Personality Quiz ✦</div>

    <h1 class="intro-title">Who Are You<br>This <span>Avurudu?</span></h1>
    <p class="intro-sub">Discover your true Avurudu spirit — are you the master chef, the fearless competitor, or the village legend?</p>

    <!-- Character preview -->
    <div class="char-strip" id="charStrip">
      <!-- filled by JS based on gender -->
    </div>

    <!-- Gender pick -->
    <div class="gender-row">
      <button class="gender-btn" id="btnF" onclick="pickGender('F')">
        <span class="g-emoji">👩</span>Her Avurudu
      </button>
      <button class="gender-btn" id="btnM" onclick="pickGender('M')">
        <span class="g-emoji">👨</span>His Avurudu
      </button>

    <button class="btn-start" onclick="startQuiz()">✦ BEGIN THE JOURNEY ✦</button>
  </div>

  <!-- ════ QUIZ SCREEN ════ -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-card">
      <div class="q-progress">

        <div class="q-counter" id="qPct">12%</div>
      </div>
      <div class="q-icon" id="qIcon">🌸</div>
      <div class="q-text" id="qText">Loading...</div>
      <div class="answers-grid" id="qAnswers"></div>
    </div>
  </div>

  <!-- ════ RESULT SCREEN ════ -->
  <div class="screen" id="screen-result">
    <div class="result-wrap">
      <div class="result-card" id="resultCard">
        <div class="result-banner" id="resultBanner">
          <span class="result-emoji-big" id="resEmoji"></span>
          <div class="result-archetype" id="resArchetype"></div>
          <div class="result-name" id="resName"></div>
          <div class="result-title-sinhala" id="resSinhala"></div>
        </div>
        <div class="result-body">
          <div class="result-desc" id="resDesc"></div>
          <div class="traits-row" id="resTraits"></div>
          <div class="fun-fact-box">
            <div class="fun-fact-label">🌺 Fun Avurudu Fact</div>
            <div class="fun-fact-text" id="resFact"></div>
          </div>
          <div class="share-row">
            <button class="btn-share btn-copy" onclick="copyResult()">📋 Copy Result</button>
            <button class="btn-share btn-again" onclick="resetQuiz()">🔄 Play Again</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  CHARACTERS
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let gender = null;
let currentQ = 0;
let scores = {};

// ══════════════════════════════════════════════
//  INIT CHAR STRIP
// ══════════════════════════════════════════════
function renderCharStrip(g) {
  const list = g ? CHARS[g] : [...CHARS.F.slice(0,3), ...CHARS.M.slice(0,2)];
  const strip = document.getElementById('charStrip');
  strip.innerHTML = list.map(c => `
    <div class="char-preview" style="border-color:${c.color}30">
      <div class="char-emoji">${c.emoji}</div>
      <div class="char-name-mini">${c.name}</div>
    </div>
  `).join('');
}
renderCharStrip(null);

function pickGender(g) {
  gender = g;
  document.getElementById('btnF').classList.toggle('selected', g === 'F');
  document.getElementById('btnM').classList.toggle('selected', g === 'M');
  renderCharStrip(g);
}

// ══════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════
function startQuiz() {
  if(!gender) { showToast('Pick your Avurudu path first! 👆'); return; }
  scores = {};
  CHARS[gender].forEach(c => scores[c.id] = 0);
  currentQ = 0;
  showScreen('screen-quiz');
  renderQuestion();
}

// ══════════════════════════════════════════════
//  RENDER QUESTION
// ══════════════════════════════════════════════
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;
  const pct = Math.round(((currentQ + 1) / total) * 100);

  document.getElementById('qCounter').textContent = `Q ${currentQ + 1} / ${total}`;
  document.getElementById('qBar').style.width = pct + '%';
  document.getElementById('qPct').textContent = pct + '%';
  document.getElementById('qIcon').textContent = q.icon;

  // Animate icon
  const icon = document.getElementById('qIcon');
  icon.style.animation = 'none';
  void icon.offsetWidth;
  icon.style.animation = 'bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1)';

  document.getElementById('qText').textContent = q.text;

  const grid = document.getElementById('qAnswers');
  grid.innerHTML = q.answers.map((a, i) => `
    <button class="ans-btn" onclick="pickAnswer(${i})">
      <span class="ans-emoji">${a.emoji}</span>
      <span>${a.text}</span>
    </button>
  `).join('');
}

// ══════════════════════════════════════════════
//  PICK ANSWER
// ══════════════════════════════════════════════
function pickAnswer(idx) {
  // Highlight chosen
  document.querySelectorAll('.ans-btn').forEach((b,i) => {
    if(i === idx) b.classList.add('chosen');
    b.onclick = null; // prevent double click
  });

  const a = QUESTIONS[currentQ].answers[idx];
  const charId = a[gender];
  if(scores[charId] !== undefined) scores[charId]++;

  setTimeout(() => {
    currentQ++;
    if(currentQ < QUESTIONS.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 420);
}

// ══════════════════════════════════════════════
//  SHOW RESULT
// ══════════════════════════════════════════════
function showResult() {
  // Find winner
  let topId = Object.keys(scores).reduce((a,b) => scores[a] >= scores[b] ? a : b);
  const char = CHARS[gender].find(c => c.id === topId);

  // Banner
  const banner = document.getElementById('resultBanner');
  banner.style.background = `linear-gradient(145deg, ${char.color}, ${char.color}cc)`;
  banner.style.color = char.textColor;

  document.getElementById('resEmoji').textContent = char.emoji;
  document.getElementById('resArchetype').textContent = char.archetype;
  document.getElementById('resArchetype').style.color = char.textColor;
  document.getElementById('resName').textContent = char.name;
  document.getElementById('resName').style.color = char.textColor;
  document.getElementById('resSinhala').textContent = char.sinhala;
  document.getElementById('resSinhala').style.color = char.textColor;

  document.getElementById('resDesc').textContent = char.desc;
  document.getElementById('resFact').textContent = char.fact;

  // Traits
  const traitsEl = document.getElementById('resTraits');
  traitsEl.innerHTML = char.traits.map((t, i) => `
    <span class="trait-chip" style="color:${char.traitColors[i % char.traitColors.length]};border-color:${char.traitColors[i % char.traitColors.length]}40;background:${char.traitColors[i % char.traitColors.length]}12">${t}</span>
  `).join('');

  showScreen('screen-result');
  launchConfetti(char.color);
}

// ══════════════════════════════════════════════
//  SCREEN SWITCHING
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('visible'));
  const el = document.getElementById(id);
  el.classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetQuiz() {
  gender = null;
  document.getElementById('btnF').classList.remove('selected');
  document.getElementById('btnM').classList.remove('selected');
  renderCharStrip(null);
  showScreen('screen-intro');
}

// ══════════════════════════════════════════════
//  COPY RESULT
// ══════════════════════════════════════════════
function copyResult() {
  if(!gender) return;
  const scores2 = scores;
  const topId = Object.keys(scores2).reduce((a,b) => scores2[a] >= scores2[b] ? a : b);
  const char = CHARS[gender].find(c => c.id === topId);
  const text = `🌺 My ERABADU 2026 Avurudu Personality:\n\n${char.emoji} ${char.name} (${char.sinhala})\n"${char.archetype}"\n\n${char.desc.slice(0,120)}...\n\n— AIESEC in NIBM | ERABADU 2026`;
  navigator.clipboard.writeText(text).then(() => showToast('Copied! Share your spirit 🌺'));
}

// ══════════════════════════════════════════════
//  CONFETTI
// ══════════════════════════════════════════════
function launchConfetti(accentColor) {
  const colors = [accentColor, '#F0C060', '#FFFFFF', '#C4654A', '#FF8C38', '#A8161E'];
  for(let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const size = 8 + Math.random() * 10;
      el.style.cssText = `
        left:${Math.random()*100}vw;
        width:${size}px; height:${size * (0.5 + Math.random())}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration:${2 + Math.random()*2.5}s;
        animation-delay:${Math.random()*0.8}s;
        opacity:${0.7 + Math.random()*0.3};
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
